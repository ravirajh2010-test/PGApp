services:
  - type: web
    name: pg-stay-backend
    env: node
    region: oregon
    plan: free
    rootDirectory: backend
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: pg-stay-db
          property: connectionString
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  - type: static_site
    name: pg-stay-frontend
    env: node
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://pg-stay-backend.onrender.com/api

databases:
  - name: pg-stay-db
    databaseName: pgstay_prod
    user: pgstay_user
    region: oregon
    plan: free
