services:
  - type: web
    name: pg-stay-backend
    env: node
    region: oregon
    plan: free
    root: backend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: pg-stay-db
          property: connectionString
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

databases:
  - name: pg-stay-db
    databaseName: pgstay_prod
    user: pgstay_user
    region: oregon
    plan: free
